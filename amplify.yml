version: 0.1
frontend:
  phases:
    preBuild:
      commands:
        - bundle install
    build:
      commands:
        - gem install sprockets -v 4.0.0.beta8
        - gem install nokogiri -v 1.10.10
        - gem install jekyll-watch jekyll-assets
        - bundle exec jekyll b
  artifacts:
    baseDirectory: _site
    files:
      - '**/*'
  cache:
    paths: []
